# Example: strict mode
location /phase4 {
    modsecurity on;
    modsecurity_phase4_mode strict;
    modsecurity_phase4_log /var/log/nginx/modsecurity-phase4.log;

    modsecurity_rules '
        SecRuleEngine On
        SecResponseBodyAccess On
        SecRule RESPONSE_BODY "@rx sensitive-marker" "id:940003,phase:4,deny,log,status:403"
    ';

    proxy_pass http://backend;
}
